<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EngVocabular</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="dictionary.js"></script>
</head>
<body>
    <div class="login-overlay hidden" id="settings-overlay">
        <div class="login-modal">
            <h1 class="logo">EngVocabular</h1>
            <p id="settings-desc">Настройте синхронизацию</p>
            <input type="text" class="login-input" id="nickname-input" placeholder="Ваш никнейм" maxlength="30" autocomplete="off">
            <input type="password" class="login-input" id="token-input" placeholder="GitHub Personal Access Token" autocomplete="off">
            <input type="text" class="login-input" id="owner-input" placeholder="Владелец репозитория (username)">
            <input type="text" class="login-input" id="repo-input" placeholder="Название репозитория">
            <button class="login-btn" id="settings-btn">Сохранить</button>
            <button class="login-btn login-btn-secondary" id="settings-cancel-btn">Отмена</button>
            <p class="settings-hint" id="settings-hint"></p>
        </div>
    </div>

    <div class="container">
        <header>
            <h1 class="logo">EngVocabular</h1>
            <div class="stats" id="stats">
                <span class="stat"><span class="stat-value" id="stat-known">0</span> изучено</span>
                <span class="stat-divider"></span>
                <span class="stat"><span class="stat-value" id="stat-remaining">0</span> осталось</span>
                <span class="stat-divider"></span>
                <span class="stat"><span class="stat-value" id="stat-total">0</span> всего</span>
            </div>
        </header>

        <main>
            <div class="card" id="card">
                <div class="mode-badge" id="mode-badge">УЧИМ</div>
                <div class="word-display" id="word-display">
                    <div class="word-row">
                        <div class="word-english" id="word-english">Загрузка...</div>
                        <button class="btn-speak" id="btn-speak" title="Прослушать произношение">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                            </svg>
                        </button>
                    </div>
                    <div class="word-russian hidden" id="word-russian"></div>
                </div>
                <div class="actions" id="actions">
                    <button class="btn btn-know" id="btn-know">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        Знаю
                    </button>
                    <button class="btn btn-dontknow" id="btn-dontknow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        Не знаю
                    </button>
                </div>
                <div class="hint" id="hint">«Не знаю» — перевод &nbsp;·&nbsp; 🔊 S — произношение</div>
            </div>

            <div class="footer-links">
                <button class="btn-link" id="btn-reset">Сбросить прогресс</button>
                <span class="dot"></span>
                <span id="word-count-info"></span>
                <span class="dot" id="dot-nickname"></span>
                <span id="nickname-display"></span>
                <button class="btn-link" id="btn-settings">Настройки</button>
            </div>
        </main>
    </div>

    <script>
        // =========================================================
        //  СИНХРОНИЗАЦИЯ ЧЕРЕЗ GITHUB API
        //
        //  Прогресс:         data/progress.json
        //  Зашифрованный токен: data/config.json (ключ = ваш никнейм)
        //
        //  На первом устройстве: вводите никнейм + токен
        //  Токен шифруется никнеймом и сохраняется в config.json
        //  На новом устройстве: вводите только никнейм
        //  Токен расшифровывается из config.json
        // =========================================================

        const STORAGE_KEY = 'engvocabular_known';
        const SETTINGS_KEY = 'engvocabular_settings';
        const CONFIG_PATH = 'data/config.json';
        const PROGRESS_PATH = 'data/progress.json';
        const GITHUB_API = 'https://api.github.com';

        // === Crypto helpers ===
        function buf2b64(buf) {
            return btoa(String.fromCharCode(...new Uint8Array(buf)));
        }
        function b642buf(s) {
            return Uint8Array.from(atob(s), c => c.charCodeAt(0));
        }
        async function deriveKey(password, salt) {
            const keyMaterial = await crypto.subtle.importKey(
                'raw', new TextEncoder().encode(password),
                'PBKDF2', false, ['deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false, ['encrypt', 'decrypt']
            );
        }
        async function encryptToken(token, password) {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveKey(password, salt);
            const enc = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv }, key,
                new TextEncoder().encode(token)
            );
            return { encrypted: buf2b64(enc), salt: buf2b64(salt), iv: buf2b64(iv) };
        }
        async function decryptToken(payload, password) {
            const key = await deriveKey(password, b642buf(payload.salt));
            const dec = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: b642buf(payload.iv) }, key,
                b642buf(payload.encrypted)
            );
            return new TextDecoder().decode(dec);
        }

        // === Settings ===
        function loadSettings() {
            try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; }
            catch { return {}; }
        }
        function saveSettings(s) {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
        }

        let settings = loadSettings();
        let nickname = settings.nickname || '';
        let githubToken = settings.token || '';
        let repoOwner = settings.owner || '';
        let repoName = settings.repo || '';

        // === Auto-detect repo from URL ===
        function detectRepo() {
            if (repoOwner && repoName) return true;
            try {
                const url = new URL(window.location.href);
                if (url.hostname.endsWith('github.io')) {
                    const parts = url.pathname.split('/').filter(Boolean);
                    if (parts.length > 0) {
                        repoOwner = url.hostname.split('.')[0];
                        repoName = parts[0];
                        saveSettings({ nickname, token: githubToken, owner: repoOwner, repo: repoName });
                        return true;
                    }
                }
            } catch {}
            return false;
        }

        // === Known set helpers ===
        function getKnownSet() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                return stored ? new Set(JSON.parse(stored)) : new Set();
            } catch { return new Set(); }
        }
        function saveKnownSet(set) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
        }

        // === GitHub API ===
        // Read public file via raw URL (no auth needed)
        async function ghRead(path) {
            const url = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/main/${path}`;
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                return await res.json();
            } catch { return null; }
        }
        // Get file info + sha from API (needed for writing)
        async function ghMeta(path) {
            const url = `${GITHUB_API}/repos/${repoOwner}/${repoName}/contents/${path}`;
            try {
                const res = await fetch(url, {
                    headers: { Accept: 'application/vnd.github.v3+json' }
                });
                if (res.status === 404) return null;
                if (!res.ok) return null;
                const json = await res.json();
                return { sha: json.sha, data: JSON.parse(atob(json.content)) };
            } catch { return null; }
        }
        // Write file via API (needs token)
        async function ghWrite(path, data, sha) {
            const url = `${GITHUB_API}/repos/${repoOwner}/${repoName}/contents/${path}`;
            const body = {
                message: `update ${path}`,
                content: btoa(JSON.stringify(data)),
                branch: 'main'
            };
            if (sha) body.sha = sha;
            try {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        Authorization: `token ${githubToken}`,
                        Accept: 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                return res.ok;
            } catch { return false; }
        }

        // === Config (encrypted token) ===
        async function loadConfigFromRepo() {
            return ghRead(CONFIG_PATH);
        }
        async function saveConfigToRepo(payload) {
            const existing = await ghMeta(CONFIG_PATH);
            const sha = existing ? existing.sha : null;
            return ghWrite(CONFIG_PATH, payload, sha);
        }

        // === Progress sync ===
        async function fetchProgress() {
            if (!repoOwner || !repoName) return null;
            return ghRead(PROGRESS_PATH);
        }
        async function saveProgressToGitHub(set) {
            if (!repoOwner || !repoName || !nickname) return;
            const existing = await ghMeta(PROGRESS_PATH);
            const data = existing ? existing.data : {};
            data[nickname] = [...set];
            await ghWrite(PROGRESS_PATH, data, existing ? existing.sha : null);
        }
        async function syncFromGitHub() {
            if (!repoOwner || !repoName || !nickname) return;
            const data = await fetchProgress();
            if (!data) return;
            const serverIndices = new Set((data[nickname] || []));
            const localSet = getKnownSet();
            const merged = new Set([...localSet, ...serverIndices]);
            if (merged.size !== localSet.size) {
                saveKnownSet(merged);
                renderStats();
                loadNext();
            }
            if (merged.size > serverIndices.size) {
                await saveProgressToGitHub(merged);
            }
        }

        // === Settings UI ===
        const overlay = document.getElementById('settings-overlay');
        const nicknameInput = document.getElementById('nickname-input');
        const tokenInput = document.getElementById('token-input');
        const ownerInput = document.getElementById('owner-input');
        const repoInput = document.getElementById('repo-input');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsDesc = document.getElementById('settings-desc');
        const settingsHint = document.getElementById('settings-hint');

        let settingsMode = 'setup';

        function switchToLoginMode() {
            settingsMode = 'login';
            settingsDesc.textContent = 'Введите ваш никнейм, чтобы войти';
            tokenInput.classList.add('hidden');
            ownerInput.classList.add('hidden');
            repoInput.classList.add('hidden');
            settingsBtn.textContent = 'Войти';
            settingsHint.textContent = '';
        }

        function switchToSetupMode() {
            settingsMode = 'setup';
            settingsDesc.textContent = 'Настройте синхронизацию через GitHub';
            tokenInput.classList.remove('hidden');
            ownerInput.classList.remove('hidden');
            repoInput.classList.remove('hidden');
            settingsBtn.textContent = 'Сохранить';
            settingsHint.textContent = '';
        }

        function showSettings(message) {
            overlay.classList.remove('hidden');
            nicknameInput.value = nickname;
            tokenInput.value = githubToken;
            ownerInput.value = repoOwner;
            repoInput.value = repoName;
            if (message) settingsHint.textContent = message;
            nicknameInput.focus();
        }
        function hideSettings() {
            overlay.classList.add('hidden');
        }

        // On first show, decide mode
        function initSettingsUI() {
            const repoKnown = detectRepo();
            if (nickname && githubToken) {
                // Already fully configured — hide settings
                hideSettings();
                updateNicknameUI();
                syncFromGitHub();
                return;
            }
            if (repoKnown && !githubToken && nickname) {
                // Repo known, user known by nickname, but no token locally
                // Try to load config from repo
                showSettings();
                switchToLoginMode();
                return;
            }
            if (repoKnown) {
                // Repo known, no config at all
                showSettings();
                switchToSetupMode();
                ownerInput.value = repoOwner;
                repoInput.value = repoName;
                return;
            }
            // No repo known — full setup
            showSettings();
            switchToSetupMode();
        }

        settingsBtn.addEventListener('click', async () => {
            const val = nicknameInput.value.trim();
            if (!val) return;

            if (settingsMode === 'login') {
                // Login mode: only nickname needed, decrypt token from config.json
                settingsHint.textContent = 'Загружаем данные...';
                const config = await loadConfigFromRepo();
                if (!config) {
                    settingsHint.textContent = 'Ошибка: файл config.json не найден в репозитории. Сначала настройте синхронизацию с этого же устройства.';
                    return;
                }
                let token;
                try {
                    token = await decryptToken(config, val);
                } catch {
                    settingsHint.textContent = 'Ошибка: неверный никнейм.';
                    return;
                }
                nickname = val;
                githubToken = token;
                saveSettings({ nickname, token: githubToken, owner: repoOwner, repo: repoName });
                hideSettings();
                updateNicknameUI();
                syncFromGitHub();
                return;
            }

            // Setup mode: full settings
            const token = tokenInput.value.trim();
            let owner = ownerInput.value.trim() || repoOwner;
            let repo = repoInput.value.trim() || repoName;
            if (!token || !owner || !repo) return;

            // Check if anything actually changed
            const sameNick = val === nickname;
            const sameToken = token === githubToken;
            const sameOwner = owner === repoOwner;
            const sameRepo = repo === repoName;

            if (sameNick && sameToken && sameOwner && sameRepo) {
                hideSettings();
                return;
            }

            nickname = val;
            githubToken = token;
            repoOwner = owner;
            repoName = repo;
            saveSettings({ nickname, token: githubToken, owner: repoOwner, repo: repoName });

            // If token or nickname changed, re-encrypt and save config to repo
            if (!sameToken || !sameNick) {
                settingsHint.textContent = 'Сохраняем настройки в репозиторий...';
                const payload = await encryptToken(githubToken, nickname);
                const saved = await saveConfigToRepo(payload);
                if (!saved) {
                    settingsHint.textContent = 'Ошибка: не удалось сохранить config.json. Проверьте токен и название репозитория.';
                    return;
                }
            }

            hideSettings();
            updateNicknameUI();
            syncFromGitHub();
        });

        tokenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && settingsMode === 'setup') settingsBtn.click();
        });
        nicknameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (settingsMode === 'login') settingsBtn.click();
                else tokenInput.focus();
            }
        });
        ownerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') repoInput.focus();
        });
        repoInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && settingsMode === 'setup') settingsBtn.click();
        });

        document.getElementById('settings-cancel-btn').addEventListener('click', () => {
            settingsHint.textContent = '';
            hideSettings();
        });

        document.getElementById('btn-settings').addEventListener('click', () => {
            settingsHint.textContent = '';
            nicknameInput.value = nickname;
            tokenInput.value = githubToken;
            ownerInput.value = repoOwner;
            repoInput.value = repoName;
            switchToSetupMode();
            showSettings();
        });

        function updateNicknameUI() {
            const display = document.getElementById('nickname-display');
            const dot = document.getElementById('dot-nickname');
            if (nickname && githubToken && repoOwner && repoName) {
                display.textContent = nickname;
                display.classList.remove('hidden');
                dot.classList.remove('hidden');
            } else {
                display.classList.add('hidden');
                dot.classList.add('hidden');
            }
        }

        // === Word display logic ===
        function getLearningWords() {
            const known = getKnownSet();
            return WORDS.filter((_, i) => !known.has(i));
        }
        function renderStats() {
            const total = WORDS.length;
            const known = getKnownSet().size;
            const remaining = total - known;
            document.getElementById('stat-known').textContent = known;
            document.getElementById('stat-remaining').textContent = remaining;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('word-count-info').textContent = `${known} / ${total} изучено`;
        }

        let translationShown = false;
        let currentWord = null;

        function loadNext() {
            const learning = getLearningWords();
            if (learning.length === 0) {
                document.getElementById('word-english').textContent = 'Поздравляю! Все слова изучены!';
                document.getElementById('word-russian').classList.add('hidden');
                document.getElementById('actions').classList.add('hidden');
                document.getElementById('hint').classList.add('hidden');
                document.getElementById('mode-badge').textContent = 'ГОТОВО';
                currentWord = null;
                return;
            }
            const randomWord = learning[Math.floor(Math.random() * learning.length)];
            currentWord = randomWord;
            translationShown = false;
            document.getElementById('word-english').textContent = randomWord[0];
            document.getElementById('word-russian').textContent = randomWord[1];
            document.getElementById('word-russian').classList.add('hidden');
            document.getElementById('actions').classList.remove('hidden');
            document.getElementById('hint').classList.remove('hidden');
            document.getElementById('mode-badge').textContent = 'УЧИМ';
        }

        let bestVoice = null;
        function initVoice() {
            const voices = speechSynthesis.getVoices();
            bestVoice = voices.find(v => v.lang.startsWith('en-US') && /samantha|ava|female/i.test(v.name))
                     || voices.find(v => v.lang.startsWith('en-US'))
                     || voices.find(v => v.lang.startsWith('en'));
        }
        initVoice();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = initVoice;
        }
        function speak(word) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            if (bestVoice) utterance.voice = bestVoice;
            const btn = document.getElementById('btn-speak');
            btn.classList.add('speaking');
            utterance.onend = () => btn.classList.remove('speaking');
            utterance.onerror = () => btn.classList.remove('speaking');
            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('btn-speak').addEventListener('click', () => {
            if (currentWord) speak(currentWord[0]);
        });
        document.getElementById('btn-know').addEventListener('click', async () => {
            if (!currentWord) return;
            const idx = WORDS.indexOf(currentWord);
            if (idx !== -1) {
                const known = getKnownSet();
                known.add(idx);
                saveKnownSet(known);
                renderStats();
                if (githubToken && nickname) await saveProgressToGitHub(known);
            }
            loadNext();
        });
        document.getElementById('btn-dontknow').addEventListener('click', () => {
            if (!currentWord) return;
            if (!translationShown) {
                document.getElementById('word-russian').classList.remove('hidden');
                document.getElementById('hint').classList.add('hidden');
                document.getElementById('mode-badge').textContent = 'ПЕРЕВОД';
                translationShown = true;
                return;
            }
            loadNext();
        });
        document.getElementById('btn-reset').addEventListener('click', async () => {
            if (!confirm('Сбросить весь прогресс? Все слова будут как новые.')) return;
            localStorage.removeItem(STORAGE_KEY);
            if (nickname && repoOwner && repoName) {
                await saveProgressToGitHub([]);
            }
            renderStats();
            loadNext();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'k' || e.key === 'K') {
                document.getElementById('btn-know').click();
            } else if (e.key === 'ArrowLeft' || e.key === 'n' || e.key === 'N') {
                document.getElementById('btn-dontknow').click();
            } else if (e.key === 's' || e.key === 'S' || e.key === ' ') {
                e.preventDefault();
                document.getElementById('btn-speak').click();
            }
        });

        renderStats();
        loadNext();
        initSettingsUI();
    </script>
</body>
</html>
